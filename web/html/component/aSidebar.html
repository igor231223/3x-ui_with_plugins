{{define "component/sidebar/content"}}
<template>
    <div class="ant-sidebar">
        <a-layout-sider :theme="themeSwitcher.currentTheme" collapsible :collapsed="collapsed"
            @collapse="(isCollapsed, type) => collapseHandle(isCollapsed, type)" breakpoint="md">
            <a-theme-switch></a-theme-switch>
            <a-menu :theme="themeSwitcher.currentTheme" mode="inline" :selected-keys="activeTab"
                @click="({key}) => openLink(key)">
                <template v-for="tab in allTabs">
                    <a-menu-divider v-if="tab.__divider" :key="tab.key"></a-menu-divider>
                    <a-menu-item v-else :key="tab.key">
                    <a-icon :type="tab.icon"></a-icon>
                    <span v-text="tab.title"></span>
                    </a-menu-item>
                </template>
            </a-menu>
        </a-layout-sider>
        <a-drawer placement="left" :closable="false" @close="closeDrawer" :visible="visible"
            :wrap-class-name="themeSwitcher.currentTheme" :wrap-style="{ padding: 0 }" :style="{ height: '100%' }">
            <div class="drawer-handle" @click="toggleDrawer" slot="handle">
                <a-icon :type="visible ? 'close' : 'menu-fold'"></a-icon>
            </div>
            <a-theme-switch></a-theme-switch>
            <a-menu :theme="themeSwitcher.currentTheme" mode="inline" :selected-keys="activeTab"
                @click="({key}) => openLink(key)">
                <template v-for="tab in allTabs">
                    <a-menu-divider v-if="tab.__divider" :key="tab.key"></a-menu-divider>
                    <a-menu-item v-else :key="tab.key">
                    <a-icon :type="tab.icon"></a-icon>
                    <span v-text="tab.title"></span>
                    </a-menu-item>
                </template>
            </a-menu>
        </a-drawer>
    </div>
</template>
{{end}}

{{define "component/aSidebar"}}
<style>
    .ant-sidebar>.ant-layout-sider {
        height: 100%;
    }
</style>

<script>
    const SIDEBAR_COLLAPSED_KEY = "isSidebarCollapsed"

    Vue.component('a-sidebar', {
        data() {
            return {
                tabs: [
                    {
                        key: '{{ .base_path }}panel/',
                        icon: 'dashboard',
                        title: '{{ i18n "menu.dashboard"}}'
                    },
                    {
                        key: '{{ .base_path }}panel/inbounds',
                        icon: 'user',
                        title: '{{ i18n "menu.inbounds"}}'
                    },
                    {
                        key: '{{ .base_path }}panel/settings',
                        icon: 'setting',
                        title: '{{ i18n "menu.settings"}}'
                    },
                    {
                        key: '{{ .base_path }}panel/xray',
                        icon: 'tool',
                        title: '{{ i18n "menu.xray"}}'
                    },
                    {
                        key: '{{ .base_path }}panel/plugins',
                        icon: 'appstore',
                        title: '{{ i18n "menu.plugins"}}'
                    },
                    {
                        key: '{{ .base_path }}logout/',
                        icon: 'logout',
                        title: '{{ i18n "menu.logout"}}'
                    },
                ],
                pluginTabs: [],
                pluginTabsTimer: null,
                activeTab: [
                    '{{ .request_uri }}'
                ],
                visible: false,
                collapsed: JSON.parse(localStorage.getItem(SIDEBAR_COLLAPSED_KEY)),
            }
        },
        methods: {
            openLink(key) {
                return (typeof key === 'string' && key.startsWith('http')) ? 
                    window.open(key) : 
                    location.href = key
            },
            async loadPluginTabs() {
                try {
                    const msg = await HttpUtil.get('{{ .base_path }}panel/api/plugins/menu-items');
                    if (!msg.success || !Array.isArray(msg.obj)) {
                        this.pluginTabs = [];
                        return;
                    }
                    this.pluginTabs = msg.obj
                        .filter((t) => t && t.key)
                        .map((t) => ({
                            key: t.key,
                            icon: t.icon || 'appstore',
                            title: t.title || t.key,
                            external: !!t.external,
                        }));
                } catch (_) {
                    this.pluginTabs = [];
                }
            },
            closeDrawer() {
                this.visible = false;
            },
            toggleDrawer() {
                this.visible = !this.visible;
            },
            collapseHandle(collapsed, type) {
                if (type === "clickTrigger") {
                    localStorage.setItem(SIDEBAR_COLLAPSED_KEY, collapsed);

                    this.collapsed = JSON.parse(localStorage.getItem(SIDEBAR_COLLAPSED_KEY));
                }
            }
        },
        computed: {
            allTabs() {
                if (!Array.isArray(this.pluginTabs) || this.pluginTabs.length === 0) {
                    return this.tabs;
                }
                const base = this.tabs.filter((t) => t.key !== '{{ .base_path }}logout/');
                const logout = this.tabs.find((t) => t.key === '{{ .base_path }}logout/');
                const divider = { key: '__plugins_divider__', __divider: true };
                return logout ? [...base, divider, ...this.pluginTabs, logout] : [...base, divider, ...this.pluginTabs];
            },
        },
        mounted() {
            this.loadPluginTabs();
            this.pluginTabsTimer = setInterval(() => this.loadPluginTabs(), 10000);
            window.addEventListener('focus', this.loadPluginTabs);
        },
        beforeDestroy() {
            if (this.pluginTabsTimer) {
                clearInterval(this.pluginTabsTimer);
                this.pluginTabsTimer = null;
            }
            window.removeEventListener('focus', this.loadPluginTabs);
        },
        template: `{{template "component/sidebar/content"}}`,
    });
</script>
{{end}}
